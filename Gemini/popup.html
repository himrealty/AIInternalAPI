<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 400px; padding: 20px; font-family: monospace; background: #0A0C14; color: #fff; }
    textarea { width: 100%; padding: 10px; margin: 10px 0; background: #1a1f2e; border: 1px solid #2a3a52; color: #fff; border-radius: 8px; font-family: monospace; resize: vertical; }
    button { background: #00e5a0; color: #000; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
    button:hover { background: #00cc8c; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { margin-top: 10px; padding: 10px; background: #1a1f2e; border-radius: 8px; font-size: 12px; word-break: break-all; }
    .status-text { font-size: 11px; color: #6b85a0; margin-top: 5px; }
    hr { border-color: #2a3a52; margin: 15px 0; }
    .checkbox { display: flex; align-items: center; gap: 8px; margin: 10px 0; }
    .checkbox label { font-size: 12px; cursor: pointer; }
  </style>
</head>
<body>
  <h3>🎨 Gemini Image Generator</h3>
  <textarea id="prompt" rows="4" placeholder="Describe the image you want to generate...&#10;&#10;Example: A cute cat sitting on a rainbow, digital art, vibrant colors"></textarea>
  
  <div class="checkbox">
    <input type="checkbox" id="autoDownload" checked>
    <label for="autoDownload">Auto-download after generation</label>
  </div>
  
  <button id="generate">Generate Image</button>
  <button id="download" disabled>Download Last Image</button>
  
  <div id="status"></div>
  <div class="status-text" id="statusText">Ready</div>
  
  <hr>
  <div style="font-size: 11px; color: #6b85a0;">
    💡 External apps can send:<br>
    <code style="background:#1a1f2e; padding:2px 4px;">chrome.runtime.sendMessage(extensionId, {action:"generate", prompt:"cat", autoDownload:true})</code>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
