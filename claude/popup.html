<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { width: 220px; padding: 16px; font-family: system-ui, sans-serif; font-size: 13px; color: #111; margin: 0; }
  h2 { font-size: 14px; font-weight: 600; margin: 0 0 8px; }
  p { color: #6b7280; margin: 0 0 12px; line-height: 1.5; }
  button {
    width: 100%; padding: 9px;
    background: #111; color: #fff;
    border: none; border-radius: 8px;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
  }
  button:hover { background: #374151; }
  .note { font-size: 11px; color: #9ca3af; margin-top: 10px; }
</style>
</head>
<body>
  <h2>✦ Claude Sidebar</h2>
  <p>Opens a chat panel on the right side of claude.ai.</p>
  <button id="open">Open on claude.ai</button>
  <p class="note">Navigate to claude.ai first, then click Open.</p>
  <script src="popup.js"></script>
</body>
</html>
